<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#7cc7ff" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#5fe3c7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#5fe3c7"/>
      <stop offset="50%" stop-color="#7cc7ff"/>
      <stop offset="100%" stop-color="#b59bff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="120" cy="120" r="118" fill="url(#bg)" stroke="url(#ring)" stroke-width="3"/>
  <text x="120" y="148" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif"
        font-size="110" font-weight="700" fill="#fff" letter-spacing="-4"
        filter="url(#glow)" opacity="0.95">L</text>
</svg>
